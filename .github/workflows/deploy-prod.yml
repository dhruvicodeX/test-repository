name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: dotnet publish -c Release -o out

      - name: Deploy to Production
        run: |
          echo "Deploying to Production..."
